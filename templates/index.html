<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spell Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(30, 41, 59, 0.8);
            padding: 40px 30px;
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #38bdf8; 
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button[type="submit"] {
            background: #4f46e5;
            color: white;
            flex: 2;
        }
        button[type="submit"]:hover {
            background: #6366f1;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            flex: 1;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border-left: 4px solid #10b981;
            text-align: left;
            position: relative;
            display: none; /* শুরুতে হাইড থাকবে */
        }
        .result-box p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 2px;
        }
        .text-original {
            color: #cbd5e1;
        }
        .text-corrected {
            color: #34d399;
            font-size: 17px;
            font-weight: 500;
            display: block;
            margin-bottom: 10px;
        }
        .text-translation {
            color: #f39c12;
            font-size: 16px;
            display: block;
            margin-bottom: 20px;
        }
        .btn-copy {
            position: absolute;
            right: 15px;
            bottom: 15px;
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn-copy:hover {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Spell & Grammar Checker</h2>

    <form id="spellForm">
        <input type="text" id="inputText" placeholder="Type your sentence here..." required autocomplete="off">
        
        <div class="button-group">
            <button type="submit" id="submitBtn">✨ Check AI</button>
            <button type="button" class="btn-reset" onclick="resetForm()">🔄 Reset</button>
        </div>
    </form>

    <div class="result-box" id="resultBox">
        <p>
            <span class="label">Original:</span>
            <span class="text-original" id="originalText"></span>
        </p>
        <p style="margin-top: 15px;">
            <span class="label">Corrected:</span>
            <span class="text-corrected" id="correctedText"></span>
        </p>
        <p>
            <span class="label">Bangla Meaning:</span>
            <span class="text-translation" id="translatedText"></span>
        </p>
        
        <button class="btn-copy" onclick="copyText()">📋 Copy</button>
    </div>
</div>

<script>
    // আপনার পাইথন কোডের JSON API-এর সাথে কানেক্ট করার স্ক্রিপ্ট
    document.getElementById('spellForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const inputText = document.getElementById('inputText').value;
        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        
        // বাটন লোডিং স্টেট
        submitBtn.innerText = "⏳ Processing...";
        submitBtn.disabled = true;
        try {
            // আপনার পাইথনের /correct এন্ডপয়েন্টে JSON ডেটা পাঠানো হচ্ছে
            const response = await fetch('/correct', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: inputText })
            });
            const data = await response.json();
            // স্ক্রিনে রেজাল্ট বসানো
            document.getElementById('originalText').innerText = inputText;
            document.getElementById('correctedText').innerText = data.corrected;
            document.getElementById('translatedText').innerText = data.translated;
            
            // রেজাল্ট বক্সটি শো করা
            resultBox.style.display = "block";
        } catch (error) {
            alert("কোথাও কোনো সমস্যা হয়েছে! আবার চেষ্টা করুন।");
            console.error(error);
        } finally {
            // বাটন আগের অবস্থায় ফেরত আনা
            submitBtn.innerText = "✨ Check AI";
            submitBtn.disabled = false;
        }
    });
    // রিসেট ফাংশন
    function resetForm() {
        document.getElementById('inputText').value = '';
        document.getElementById('resultBox').style.display = "none";
    }
    // এক ক্লিকে ইংরেজি এবং বাংলা কপি করার জাভাস্ক্রিপ্ট
    function copyText() {
        var correctedText = document.getElementById("correctedText").innerText;
        var translatedText = document.getElementById("translatedText").innerText;
        var copyBtn = document.querySelector('.btn-copy');
        
        var textToCopy = `English: ${correctedText}\nBangla: ${translatedText}`;
        
        navigator.clipboard.writeText(textToCopy).then(function() {
            copyBtn.innerText = "✅ একসাথে কপি হয়েছে!";
            copyBtn.style.background = "#10b981";
            
            setTimeout(function() {
                copyBtn.innerText = "📋 Copy";
                copyBtn.style.background = "rgba(255, 255, 255, 0.1)";
            }, 2500);
        });
    }
</script>

</body>
</html>
